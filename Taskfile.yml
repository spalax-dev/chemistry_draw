version: '3'

vars:
  SIDECAR_DIR: src-tauri/sidecar
  LIB_PATH: src-tauri/lib/linux-x86_64

tasks:
  test:
    desc: Run tests for Indigo + Imago
    dir: '{{.SIDECAR_DIR}}'
    env:
      LD_LIBRARY_PATH: '../../{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    cmds:
      - cargo test

  dev:
    desc: Build sidecar, kill stale process on port 9321, then start Tauri dev
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    deps:
      - task: build-sidecar
    cmds:
      - pkill -9 indigo-server || true
      - sleep 1
      - pnpm tauri dev

  build-sidecar:
    internal: true
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    cmds:
      - cargo build --release -p indigo-server --bin indigo-server
      - cp target/release/indigo-server target/release/indigo-server-x86_64-unknown-linux-gnu

  bundle-libs:
    internal: true
    desc: Bundle transitive .so dependencies for cross-distro compatibility
    cmds:
      - bash scripts/bundle-libs.sh

  clean:
    desc: Remove compiled artifacts (Rust target, dist)
    cmds:
      - cargo clean
      - cargo clean --manifest-path src-tauri/sidecar/Cargo.toml
      - rm -rf dist

  package:
    desc: Build production .deb (bundle-libs + sidecar + frontend + package)
    deps:
      - task: bundle-libs
      - task: build-sidecar
    cmds:
      - pnpm tauri build --bundles deb
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'

  appimage:
    desc: "Build AppImage (requires appimagetool, bundled with linuxdeploy-appimage from AUR)"
    deps:
      - task: bundle-libs
      - task: build-sidecar
    cmds:
      - pnpm build
      - cargo build --release -p chemistry-draw
      - bash scripts/build-appimage.sh

  arch:
    desc: Build Arch Linux package via PKGBUILD (makepkg)
    cmds:
      - makepkg -si
