version: '3'

vars:
  SIDECAR_DIR: src-tauri/sidecar
  LIB_PATH: src-tauri/lib/linux-x86_64

tasks:
  test:
    desc: Run tests for Indigo + Imago
    dir: '{{.SIDECAR_DIR}}'
    env:
      LD_LIBRARY_PATH: '../../{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    cmds:
      - cargo test

  dev:
    desc: Build sidecar, kill stale process on port 9321, then start Tauri dev
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    deps:
      - task: build-sidecar
    cmds:
      - pkill -9 indigo-server || true
      - sleep 1
      - pnpm tauri dev

  build-sidecar:
    internal: true
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'
    cmds:
      - cargo build --release -p indigo-server --bin indigo-server
      - cp target/release/indigo-server target/release/indigo-server-x86_64-unknown-linux-gnu

  bundle-libs:
    internal: true
    desc: Bundle transitive .so dependencies for cross-distro compatibility
    cmds:
      - bash scripts/bundle-libs.sh

  clean:
    desc: Remove compiled artifacts (Rust target, dist)
    cmds:
      - cargo clean
      - cargo clean --manifest-path src-tauri/sidecar/Cargo.toml
      - rm -rf dist

  package:
    desc: Build production .deb (bundle-libs + sidecar + frontend + package)
    deps:
      - task: bundle-libs
      - task: build-sidecar
    cmds:
      - pnpm tauri build --bundles deb
    env:
      LD_LIBRARY_PATH: '{{.LIB_PATH}}:$LD_LIBRARY_PATH'

  appimage:
    desc: Build AppImage (requires linuxdeploy from AUR: linuxdeploy-appimage)
    deps:
      - task: bundle-libs
      - task: build-sidecar
    cmds:
      - pnpm build
      - cargo build --release -p chemistry-draw
      - |
        set -euo pipefail
        APP=chemistry-draw
        VER=0.1.0
        BUNDLE="target/release/bundle/appimage"
        APPDIR="$BUNDLE/$APP.AppDir"
        LIBDIR_src="src-tauri/lib/linux-x86_64"
        LIBDIR_dst="$APPDIR/usr/lib/$APP/lib/linux-x86_64"

        rm -rf "$APPDIR"
        mkdir -p "$APPDIR/usr/bin" "$LIBDIR_dst"

        # Binaries
        install -Dm755 "target/release/$APP"     "$APPDIR/usr/bin/$APP"
        install -Dm755 "target/release/indigo-server" "$APPDIR/usr/bin/indigo-server"

        # Desktop file
        mkdir -p "$APPDIR/usr/share/applications"
        cat > "$APPDIR/usr/share/applications/$APP.desktop" <<EOF
        [Desktop Entry]
        Type=Application
        Name=Chemistry Draw
        Comment=Desktop chemical structure editor
        Exec=$APP
        Icon=$APP
        Categories=Education;
        Terminal=false
        EOF

        # Icons
        for size in 32x32 128x128 256x256; do
          mkdir -p "$APPDIR/usr/share/icons/hicolor/$size/apps"
          cp "src-tauri/icons/$size.png" "$APPDIR/usr/share/icons/hicolor/$size/apps/$APP.png"
        done

        # Bundled libraries
        find "$LIBDIR_src" -name '*.so*' -exec cp -n {} "$LIBDIR_dst/" \;

        NO_STRIP=1 LD_LIBRARY_PATH="$LIBDIR_dst" linuxdeploy --appdir "$APPDIR" --output appimage
        mkdir -p "$BUNDLE"
        mv -f "$APP-x86_64.AppImage" "$BUNDLE/$APP-$VER-x86_64.AppImage"
        echo "AppImage: $BUNDLE/$APP-$VER-x86_64.AppImage"

  arch:
    desc: Build Arch Linux package via PKGBUILD (makepkg)
    cmds:
      - makepkg -si
