name: release

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release PR
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-publish:
    name: Build & publish
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build bundle
        run: >
          bash scripts/bundle-libs.sh &&
          cargo build --release -p indigo-server --bin indigo-server &&
          cp target/release/indigo-server target/release/indigo-server-x86_64-unknown-linux-gnu &&
          pnpm tauri build --bundles deb,appimage
        env:
          LD_LIBRARY_PATH: src-tauri/lib/linux-x86_64
          NO_STRIP: '1'

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
