name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run sidecar tests
        run: cargo test
        working-directory: src-tauri/sidecar
        env:
          LD_LIBRARY_PATH: ../../src-tauri/lib/linux-x86_64

      - name: Build frontend
        run: pnpm build

      - name: Build sidecar
        env:
          LD_LIBRARY_PATH: src-tauri/lib/linux-x86_64
        run: >
          cargo build --release -p indigo-server --bin indigo-server &&
          cp target/release/indigo-server target/release/indigo-server-x86_64-unknown-linux-gnu
